# Knoa edge 反向代理 —— TLS 终止 + SSE 无缓冲
#
# 由 docker-compose.yml 的 edge 服务挂载到 /etc/nginx/conf.d/default.conf。
# 证书（Let's Encrypt 或自签）放在宿主机 deploy/nginx/certs/ ：
#   fullchain.pem
#   privkey.pem
# 挂载关系见 docker-compose.yml： ./deploy/nginx/certs -> /etc/nginx/certs:ro
#
# 职责：
#   - 80   -> 301 跳 https（保留 ACME 挑战路径）
#   - 443  -> 终止 TLS，根路径反代到 frontend:80（SPA 静态资源），
#              /api/ 反代到 backend:8000（流式问答必须关闭代理缓冲）

# ---------- HTTP -> HTTPS ----------
server {
    listen 80;
    server_name _;

    # 允许 certbot 的 ACME http-01 挑战（若用 Let's Encrypt）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS（TLS 终止） ----------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # TLS 加固（禁 TLS1.1 及以下，优先服务端 cipher）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 文档上传上限（前端读成 base64 提交，偏大；与 backend 保持一致或更大）
    client_max_body_size 50m;

    # SPA 静态资源压缩
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;

    # 根路径 -> 前端 SPA（容器网络内 frontend:80）
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + SSE 流式问答：必须关闭代理缓冲，否则回答会被攒批后一次性吐出
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接关键开关
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # 强制分块传输，避免任何上游层面的缓冲
        chunked_transfer_encoding on;
    }
}
