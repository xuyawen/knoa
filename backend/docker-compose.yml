services:
  postgres:
    image: postgres:16
    container_name: knoa-postgres
    environment:
      POSTGRES_USER: knoa
      POSTGRES_PASSWORD: knoa
      POSTGRES_DB: knoa
    ports:
      - "5433:5432"
    volumes:
      - knoa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knoa"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: knoa-redis
    ports:
      - "6380:6379"
    volumes:
      - knoa_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  knoa_pgdata:
  knoa_redisdata:
