# Knoa 生产编排 — 低资源适配版（2C2G / 2GB RAM）
#
# 用法：  docker compose -f docker-compose.prod-lean.yml up -d --build
#
# 与 docker-compose.yml 的差异：
#   - 所有服务的 memory/cpus limits 大幅降低，适配 2GB RAM 服务器
#   - backup 服务改为手动/定时执行（非常驻容器），省掉常驻内存
#   - postgres shared_buffers / work_mem 等调低，减少基线占用
#   - backend 单 worker（uvicorn 默认 1 进程），避免多进程倍增内存
#
# 注意：此文件仅用于过渡期低配服务器。迁移到阿里云（4G+ RAM）后
#       切回 docker-compose.yml 原始配置即可。

services:
  postgres:
    image: postgres:16-alpine          # alpine 镜像比默认镜像小 ~200MB
    container_name: knoa-postgres
    # 低内存调优：shared_buffers 默认 128MB 对 2G 机器偏大，降到 64MB
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c random_page_cost=1.1           # SSD，鼓励索引扫描
    environment:
      POSTGRES_USER: knoa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knoa}
      POSTGRES_DB: knoa
    volumes:
      - knoa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knoa"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m                  # 原 1G → 512M（alpine + 调优后够用）

  redis:
    image: redis:7-alpine
    container_name: knoa-redis
    # 低内存：禁用持久化（RDB/AOF），纯缓存场景丢数据可接受（重启后 session 失效需重登录）
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - knoa_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96m                   # 原 256M → 96M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knoa-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://knoa:${POSTGRES_PASSWORD:-knoa}@postgres:5432/knoa
      REDIS_URL: redis://redis:6379/0
      SSL_ENABLED: "False"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://${PUBLIC_IP:-170.106.74.73}}"
      APP_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - knoa_uploads:/app/app/data/uploads
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"                    # 原 2.0 → 1.5（单核半，够用）
          memory: 768m                   # 原 2G → 768M（最大风险点：Python 内存波动）

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knoa-frontend
    depends_on:
      - backend
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m                   # 原 256M → 128M（只是 nginx，足够）

  edge:
    image: nginx:alpine
    container_name: knoa-edge
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./deploy/nginx/certbot:/var/www/certbot:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m                    # 原 256M → 64m（nginx 反代，极轻量）

  # ── 备份服务（默认不启动，按需手动运行 ──
  # 用法：  docker compose -f docker-compose.prod-lean.yml run --rm backup
  # 或用 Windows 计划任务 / cron 定时触发：
  #   docker compose -f docker-compose.prod-lean.yml run --rm backup > NUL 2>&1
  backup:
    image: postgres:16-alpine
    container_name: knoa-backup
    user: "0:0"
    profiles: ["backup"]                # 不加 --profile backup 不会启动
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: knoa
      PGPASSWORD: ${POSTGRES_PASSWORD:-knoa}
      PGDATABASE: knoa
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - knoa_backups:/backups
      - ./deploy/backup/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    command: ["sh", "-c", "/usr/local/bin/pg-backup.sh; echo 'Backup done'"]

volumes:
  knoa_pgdata:
  knoa_redisdata:
  knoa_uploads:
  knoa_backups:
