name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支的重复 push 取消上一次在跑的 CI，省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # vue-tsc -b 做类型检查，vite build 产出 dist/
      - name: Build
        run: npm run build

  backend:
    name: Backend (compile + migration smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # 起一个真实 Postgres 跑 Alembic 迁移，验证初始 schema 可落地
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knoa
          POSTGRES_PASSWORD: knoa
          POSTGRES_DB: knoa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knoa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://knoa:knoa@localhost:5432/knoa
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (uv.lock)
        run: uv sync --frozen

      - name: Compile-check all Python
        run: uv run python -m compileall -q app migrations

      - name: Import app (catch import-time errors)
        run: uv run python -c "from app.main import app; print('app import ok:', app.title)"

      # 关键守卫：迁移能在真实 Postgres 上跑通，且模型与迁移一致（无待生成迁移）
      - name: Apply Alembic migrations
        run: |
          uv run python -m alembic -c alembic.ini upgrade head
          uv run python -m alembic -c alembic.ini check
