name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支的重复 push 取消上一次在跑的 CI，省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # vue-tsc -b 做类型检查，vite build 产出 dist/
      - name: Build
        run: npm run build

  backend:
    name: Backend (compile + migration smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # 起一个真实 Postgres 跑 Alembic 迁移，验证初始 schema 可落地
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knoa
          POSTGRES_PASSWORD: knoa
          POSTGRES_DB: knoa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knoa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://knoa:knoa@localhost:5432/knoa
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (uv.lock)
        run: uv sync --frozen

      - name: Compile-check all Python
        run: uv run python -m compileall -q app migrations

      - name: Import app (catch import-time errors)
        run: uv run python -c "from app.main import app; print('app import ok:', app.title)"

      # 代码质量门禁：ruff 走项目 ruff.toml（当前锁定 pyflakes/F 规则），
      # 作为**阻塞**关卡——任何未定义名 / 未使用导入都会让流水线失败，
      # 防止此类硬错误合入主干。
      - name: Lint (ruff, blocking)
        run: uvx ruff@latest check app

      # 依赖安全扫描：仍保持非阻塞（continue-on-error）——仅出报告 + 每周看，
      # 不阻断正常发布（偶有传递依赖的 advisory 需人工研判是否真受影响）。
      - name: Dependency audit (pip-audit, non-blocking)
        continue-on-error: true
        run: uv run --with pip-audit pip-audit

      # 关键守卫：迁移能在真实 Postgres 上跑通，且模型与迁移一致（无待生成迁移）
      - name: Apply Alembic migrations
        run: |
          uv run python -m alembic -c alembic.ini upgrade head
          uv run python -m alembic -c alembic.ini check

  pytest:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # 测试用独立库 knoa_pytest；conftest 读 KNOA_TEST_PG_* 拼连接串，
    # 默认 localhost:5433，这里用 service 映射出的 5432。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knoa
          POSTGRES_PASSWORD: knoa
          POSTGRES_DB: knoa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knoa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      KNOA_TEST_PG_HOST: localhost
      KNOA_TEST_PG_PORT: "5432"
      KNOA_TEST_REDIS_HOST: localhost
      KNOA_TEST_REDIS_PORT: "6379"
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (uv.lock)
        run: uv sync --frozen

      # 跑通整套 pytest：API 冒烟 / SSE 问答 / 混合检索 / 迁移契约。
      # LLM/Embedding/Redis/Graph 全部由 conftest 的 dependency_overrides
      # 换成测试替身，无需任何 API key。
      - name: Run pytest
        run: uv run --group dev python -m pytest -v
