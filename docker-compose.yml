# Knoa 生产编排（Phase 4 加固）
#
# 启动（生产）：  docker compose up -d --build
#   -> postgres/redis/backend/frontend 仅在容器网络内互通（不暴露宿主机端口），
#      edge 反向代理对外暴露 80/443（TLS 终止），backup 服务每日 pg_dump。
#
# 开发模式：      docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   -> 恢复 pg/redis/frontend 的宿主机端口，关闭 edge/backup（用 vite 或 frontend:8080 直连）。
#
# 要点：
#   - TLS 证书放 deploy/nginx/certs/（fullchain.pem + privkey.pem），详见 deploy/nginx/README.md
#     首次本地测试可先跑 deploy/nginx/generate-selfsigned.sh 生成自签证书。
#   - 所有长驻服务 restart: unless-stopped + 资源上限，保证稳定与故障隔离。
#   - backend 跑明文 HTTP（SSL_ENABLED=False），TLS 由 edge 终止，证书私钥不进镜像。

services:
  postgres:
    image: postgres:16
    container_name: knoa-postgres
    environment:
      POSTGRES_USER: knoa
      POSTGRES_PASSWORD: knoa
      POSTGRES_DB: knoa
    volumes:
      - knoa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knoa"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  redis:
    image: redis:7-alpine
    container_name: knoa-redis
    volumes:
      - knoa_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knoa-backend
    env_file:
      - ./backend/.env
    environment:
      # 容器内通过服务名访问，覆盖 .env 里的 localhost:5433 等
      DATABASE_URL: postgresql+asyncpg://knoa:knoa@postgres:5432/knoa
      REDIS_URL: redis://redis:6379/0
      SSL_ENABLED: "False"                    # TLS 由 edge 终止，backend 明文 HTTP
      CORS_ORIGINS: "https://knoa.example.com"   # 改成你的域名（必须与访问站点的 Origin 一致）
      APP_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - knoa_uploads:/app/app/data/uploads
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knoa-frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  edge:
    image: nginx:alpine
    container_name: knoa-edge
    # 生产默认启动（无 profile）；dev override 会把它挪到 prod profile 以关闭
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./deploy/nginx/certbot:/var/www/certbot:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  backup:
    image: postgres:16
    container_name: knoa-backup
    # 生产默认启动（无 profile）；dev override 会把它挪到 prod profile 以关闭
    # 以 root 运行，确保对 knoa_backups 卷有写权限
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: knoa
      PGPASSWORD: knoa
      PGDATABASE: knoa
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - knoa_backups:/backups
      - ./deploy/backup/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    command: ["sh", "-c", "while true; do /usr/local/bin/pg-backup.sh; sleep 86400; done"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

volumes:
  knoa_pgdata:
  knoa_redisdata:
  knoa_uploads:
  knoa_backups:
